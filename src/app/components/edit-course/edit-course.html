<h2>Edit Course</h2>


@if (course) {
  <form #editForm="ngForm" (ngSubmit)="updateCourse(editForm)">
    <label>Title:</label>
    <input type="text" name="title" [(ngModel)]="course.title" required />
    <br /><br />

    <label>Instructor:</label>
    <input type="text" name="instructor" [(ngModel)]="course.instructor" required />
    <br /><br />

    <label>Duration:</label>
    <input type="text" name="duration" [(ngModel)]="course.duration" required />
    <br /><br />

    <label>Category:</label>
    <input type="text" name="category" [(ngModel)]="course.category" required />
    <br /><br />

    <label>Price:</label>
    <input type="number" name="price" [(ngModel)]="course.price" required />
    <br /><br />

    <label>Status:</label>
    <select name="status" [(ngModel)]="course.status" required>
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
    <br /><br />

    <label>Description:</label>
    <textarea name="description" [(ngModel)]="course.description" required></textarea>
    <br /><br />

    <button type="submit">Update Course</button>
  </form>
}
